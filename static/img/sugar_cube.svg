<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <defs>
    <linearGradient id="sugarTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e8e8e8" />
    </linearGradient>
    <linearGradient id="sugarLeft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0" />
      <stop offset="100%" stop-color="#c0c0c0" />
    </linearGradient>
    <linearGradient id="sugarRight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0e0e0" />
      <stop offset="100%" stop-color="#b0b0b0" />
    </linearGradient>
  </defs>
  <g transform="translate(12, 12) scale(1.1) translate(-12, -12)">
    <!-- Top face -->
    <polygon points="12,5 18,8 12,11 6,8" fill="url(#sugarTop)" stroke="#ffffff" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- Left face -->
    <polygon points="6,8 12,11 12,19 6,16" fill="url(#sugarLeft)" stroke="#e0e0e0" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- Right face -->
    <polygon points="12,11 18,8 18,16 12,19" fill="url(#sugarRight)" stroke="#d0d0d0" stroke-width="0.5" stroke-linejoin="round"/>
    <!-- Grains texture -->
    <circle cx="12" cy="8" r="0.4" fill="#ffffff"/>
    <circle cx="14" cy="9" r="0.4" fill="#ffffff"/>
    <circle cx="9" cy="13" r="0.4" fill="#ffffff"/>
    <circle cx="15" cy="15" r="0.4" fill="#ffffff"/>
    <circle cx="11" cy="16" r="0.4" fill="#ffffff"/>
    <circle cx="8" cy="11" r="0.3" fill="#ffffff"/>
    <circle cx="13" cy="18" r="0.3" fill="#ffffff"/>
  </g>
</svg>
